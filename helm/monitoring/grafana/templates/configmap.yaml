apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-grafana.fullname" . }}-datasources
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: {{ .Values.grafana.datasources.prometheus.url }}
      isDefault: true
      editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-grafana.fullname" . }}-provisioning
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-grafana.fullname" . }}-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
data:
  kubernetes-cluster-monitoring.json: |
    {
      "dashboard": {
        "title": "Kubernetes Cluster Monitoring",
        "panels": [
          {
            "title": "Node CPU Usage",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\", namespace!=\"kube-system\"}[5m])) by (node)",
                "legendFormat": "{{ "{{" }}node{{ "}}" }}"
              }
            ]
          },
          {
            "title": "Node Memory Usage",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{container!=\"\", namespace!=\"kube-system\"}) by (node)",
                "legendFormat": "{{ "{{" }}node{{ "}}" }}"
              }
            ]
          }
        ]
      }
    }
  kubernetes-overview.json: |
    {
      "dashboard": {
        "title": "K8s Cluster Overview",
        "panels": [
          {
            "title": "Pod Status (Ready vs Not Ready)",
            "type": "stat",
            "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
            "targets": [
              { "expr": "sum(kube_pod_status_ready{condition=\"true\"})" }
            ]
          },
          {
            "title": "Node Memory Usage %",
            "type": "gauge",
            "gridPos": { "h": 6, "w": 12, "x": 12, "y": 0 },
            "targets": [
              { "expr": "100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100" }
            ]
          }
        ]
      }
    }
  elasticsearch-health.json: |
    {
      "dashboard": {
        "title": "Elasticsearch Health",
        "panels": [
          {
            "title": "Cluster Status",
            "type": "stat",
            "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
            "targets": [
              { "expr": "elasticsearch_cluster_health_status{color=\"green\"}", "legendFormat": "Green" },
              { "expr": "elasticsearch_cluster_health_status{color=\"yellow\"}", "legendFormat": "Yellow" }
            ]
          },
          {
            "title": "JVM Heap Usage",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
            "targets": [
              { "expr": "elasticsearch_jvm_memory_used_bytes{area=\"heap\"}" }
            ]
          }
        ]
      }
    }
  backend-jvm-monitoring.json: |
    {
      "dashboard": {
        "title": "Backend JVM & API Monitoring",
        "panels": [
          {
            "title": "JVM Heap Usage",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
            "targets": [
              {
                "expr": "jvm_memory_used_bytes{kubernetes_namespace=\"crud-app\", area=\"heap\"}",
                "legendFormat": "Used Heap"
              }
            ]
          },
          {
            "title": "HTTP Request Throughput",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
            "targets": [
              {
                "expr": "sum(rate(http_server_requests_seconds_count{kubernetes_namespace=\"crud-app\"}[5m])) by (uri, method)",
                "legendFormat": "{{ "{{" }}method{{ "}}" }} {{ "{{" }}uri{{ "}}" }}"
              }
            ]
          },
          {
            "title": "Process CPU Usage",
            "type": "gauge",
            "gridPos": { "h": 8, "w": 6, "x": 0, "y": 8 },
            "targets": [{ "expr": "process_cpu_usage{kubernetes_namespace=\"crud-app\"} * 100" }]
          }
        ]
      }
    }
