apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-grafana.fullname" . }}-datasources
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: {{ .Values.grafana.datasources.prometheus.url }}
      isDefault: true
      editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring-grafana.fullname" . }}-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-grafana.labels" . | nindent 4 }}
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
  kubernetes-cluster-monitoring.json: |
    {
      "dashboard": {
        "title": "Kubernetes Cluster Monitoring",
        "panels": [
          {
            "title": "Node CPU Usage",
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) by (node)"
              }
            ]
          },
          {
            "title": "Node Memory Usage",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes) by (node)"
              }
            ]
          }
        ]
      }
    }
