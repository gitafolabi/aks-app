name: Frontend CI
on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  push:
    runs-on: ubuntu-latest
    needs: build
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
      
      # Corrected: Build from the frontend directory
      - name: Build local image for Snyk
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:frontend-latest

      - name: Snyk Container monitor
        run: snyk container monitor ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:frontend-latest --file=frontend/Dockerfile || true

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:frontend-latest

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      - name: Update frontend tag in Helm chart
        run: |
          sudo wget https://github.com -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq e '.frontend.image.tag = "latest"' -i helm/crud-app-chart/values.yaml
      - name: Commit and push changes
        run: |
          git config --global user.email "${{ vars.USER_EMAIL }}"
          git config --global user.name "${{ vars.USER_NAME }}"
          git add helm/crud-app-chart/values.yaml
          git commit -m "Update frontend tag [skip ci]" || echo "No changes"
          git push origin main
