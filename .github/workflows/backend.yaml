name: backend CI
on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build Spring Boot app
        run: ./mvnw clean install -DskipTests

  push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
      
      - name: Build local image for Snyk
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest

      - name: Snyk Container monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk container monitor ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest --file=backend/Dockerfile || true

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Install yq
        run: |
          # Use the same full URL that worked in your frontend
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update backend tag in Helm chart
        run: |
          yq e '.backend.image.tag = "latest"' -i helm/crud-app-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "${{ vars.USER_EMAIL }}"
          git config --global user.name "${{ vars.USER_NAME }}"
          
          # 1. Get the latest code from main BEFORE adding your changes
          git pull --rebase origin main
          
          # 2. Now stage your changes
          git add helm/crud-app-chart/values.yaml
          
          # 3. Commit and push
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update backend tag [skip ci]"
            git push origin main
          fi

