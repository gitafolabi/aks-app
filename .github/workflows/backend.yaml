name: backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Spring Boot app
        run: ./mvnw clean install -DskipTests

  push:
    runs-on: ubuntu-latest
    needs: build
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Build local image for Snyk
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest

      - name: Snyk Container monitor
        # Added || true so it reports to Snyk UI but doesn't block the push 
        # Remove '|| true' if you want to block the push on vulnerabilities
        run: snyk container monitor ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest --file=backend/Dockerfile || true

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crud-app:backend-latest

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Install yq
        run: |
          sudo wget https://github.com -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update backend tag in Helm chart
        run: |
          yq e '.backend.image.tag = "latest"' -i helm/crud-app-chart/values.yaml

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'crud-rg'
          cluster-name: 'crud-app'

      - name: Create or Update Secret
        run: |
          kubectl create secret generic backend-secrets \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Commit and push changes
        run: |
          git config --global user.email "${{ vars.USER_EMAIL }}"
          git config --global user.name "${{ vars.USER_NAME }}"
          git add helm/crud-app-chart/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update backend tag in Helm chart [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
