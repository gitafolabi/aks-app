---
# ArgoCD Application for ELK Stack Logging
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aks-elk-logging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gitafolabi/aks-app.git
    targetRevision: main
    path: helm/logging/elasticsearch
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
